<!-- LOGIN INLINE -->
<!-- ===================================================== -->
<script>
function autenticarUsuario() {

    const user = document.getElementById('loginUser')?.value.trim();

    const senha = document.getElementById('loginSenha')?.value.trim();

    const erro = document.getElementById('loginErro');

    let usuarios = JSON.parse(
        localStorage.getItem('sintaxehub_usuarios') || '[]'
    );

    // =====================================================
    // CRIA ADMIN PADRÃO
    // =====================================================

    if (usuarios.length === 0) {

        usuarios.push({
            id: Date.now(),
            nome: 'Administrador',
            usuario: 'admin',
            senha: 'admin123',
            perfil: 'admin',
            ativo: true
        });

        localStorage.setItem(
            'sintaxehub_usuarios',
            JSON.stringify(usuarios)
        );
    }

    // =====================================================
    // PROCURA USUÁRIO
    // =====================================================

    const encontrado = usuarios.find(u =>
        u.usuario === user &&
        u.senha === senha &&
        u.ativo
    );

    // =====================================================
    // ERRO LOGIN
    // =====================================================

    if (!encontrado) {

        if (erro) {

            erro.innerText =
                'Usuário ou senha inválidos.';

            erro.style.display = 'block';
        }

        return;
    }

    // =====================================================
    // SALVA SESSÃO
    // =====================================================

    localStorage.setItem(
        'sintaxehub_usuario_logado',
        JSON.stringify(encontrado)
    );

    // =====================================================
    // ESCONDE LOGIN
    // =====================================================

    document.getElementById('loginScreen').style.display =
        'none';

    // =====================================================
    // ABRE APP
    // =====================================================

    document.getElementById('app').style.display =
        'block';

    // =====================================================
    // PERMISSÕES
    // =====================================================

    if (
        typeof aplicarPermissoesUsuario === 'function'
    ) {
        aplicarPermissoesUsuario();
    }

    // =====================================================
    // DASHBOARD
    // =====================================================

    if (
        typeof atualizarIndicatorsDashboard === 'function'
    ) {
        atualizarIndicatorsDashboard();
    }

    // =====================================================
    // SININHO
    // =====================================================

    if (
        typeof atualizarCentralAvisosSininho === 'function'
    ) {
        atualizarCentralAvisosSininho();
    }

    // =====================================================
    // NAVEGAÇÃO
    // =====================================================

    if (
        typeof navigate === 'function'
    ) {
        navigate('inicio');
    }

    console.log('✅ Login realizado.');
}

window.autenticarUsuario = autenticarUsuario;
</script>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SintaxeHub - Central Operational de Busca Ativa</title>

    <!-- CSS EXTERNO -->
    <link rel="stylesheet" href="./css/styles.css">

</head>

<body>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="login-card">
            <h2 style="color:var(--text-main); margin:0 0 5px 0; font-weight:800;">
                SintaxeHub
            </h2>

            <p style="color:var(--text-muted);">
                Prontuário de Busca Ativa Territorial
            </p>

            <input
                type="text"
                id="loginUser"
                placeholder="Matrícula Municipal (Ex:440129)">

            <input
                type="password"
                id="loginSenha"
                placeholder="Senha de Acesso">

            <div
                id="loginErro"
                style="display:none;">
            </div>

            <button
                class="btn-login"
                onclick="autenticarUsuario()">

                Entrar no Sistema

            </button>
        </div>
    </div>


    <!-- APP -->
    <div id="app" style="display:none;">

        <header>

            <!-- TODO: AQUI permanece TODO o conteúdo
                 do seu header original -->

        </header>


        <nav>

            <!-- TODO: permanece a navegação original -->

        </nav>


        <div id="cabecalhoProntuario">

            <span id="cabecalhoNome"></span>

        </div>


        <div class="container">

            <!-- ========================= -->
            <!-- PAINEL INICIAL -->
            <!-- ========================= -->

            <div id="view-inicio"
                 class="view"
                 style="display:block">

                <div class="dashboard-grid">

                    <div class="dash-card">
                        <h3 id="dashHAS">0</h3>
                        <p>Hipertensos</p>
                    </div>

                    <div class="dash-card">
                        <h3 id="dashDM">0</h3>
                        <p>Diabéticos</p>
                    </div>

                    <div class="dash-card">
                        <h3 id="dashGest">0</h3>
                        <p>Pré-Natal</p>
                    </div>

                    <div class="dash-card">
                        <h3 id="dashTB">0</h3>
                        <p>Tuberculose</p>
                    </div>

                    <div class="dash-card">
                        <h3 id="dashHansen">0</h3>
                        <p>Hanseníase</p>
                    </div>

                </div>


                <div class="form-section">

                    <h3>
                        📞 Central Operational de Busca Ativa
                    </h3>

                    <input
                        type="text"
                        id="buscaNomeInicio"
                        onkeyup="buscarInicio()">

                    <div id="resultadoInicio"></div>

                </div>

            </div>


            <!-- ========================= -->
            <!-- PRONTUÁRIO -->
            <!-- ========================= -->

            <div id="view-prontuario"
                 class="view">

                <!-- AQUI você cola TODO
                     o formulário SOAP original -->

            </div>


            <!-- ========================= -->
            <!-- BANCO -->
            <!-- ========================= -->

            <div id="view-banco"
                 class="view">

                <!-- tabela original -->

            </div>


            <!-- ========================= -->
            <!-- CONFIG -->
            <!-- ========================= -->

            <div id="view-config"
                 class="view">

                <!-- painel original -->

            </div>

        </div>

    </div>



    <!-- DISCADOR -->
    <button
        class="btn-flutuante-discador"
        onclick="alternarCentralDiscagem()">

        📞

    </button>


    <div id="painelDiscagemContainer">

        <!-- conteúdo original -->

    </div>


    <!-- MODAL -->
    <div id="painelEpidemiologicoContainer">

        <!-- conteúdo original -->

    </div>


    <!-- TOAST -->
    <div id="toastNotification"></div>


    <!-- DADOS -->
    <script src="./data/ciap2.js"></script>
    <script src="./data/cipe.js"></script>


    <!-- LÓGICA -->
    <script src="./js/login.js"></script>
    <script src="./js/app.js"></script>

</body>
</html>
